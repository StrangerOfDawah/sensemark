<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sensemark card preview</title>
    <style>
      :root { color-scheme: dark; }
      body {
        min-height: 100vh;
        margin: 0;
        padding: 72px;
        background: #0d1119;
        color: #e8ecf5;
        font: 20px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { max-width: 760px; margin: 0 auto; }
      h1 { font-size: 34px; margin-bottom: 8px; }
      .hint { color: #8f99ad; margin: 0 0 42px; }
      .sample { margin: 28px 0; padding: 24px; border: 1px solid #293246; border-radius: 16px; }
      mark { color: #fff; background: #38547d; padding: 2px 5px; border-radius: 4px; }
      .hidden-copy {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        white-space: nowrap;
      }
      .controls {
        position: fixed;
        top: 22px;
        right: 22px;
        z-index: 2147483647;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        max-width: 720px;
      }
      button {
        padding: 10px 16px;
        border: 0;
        border-radius: 10px;
        background: #2e65d1;
        color: white;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sensemark UI preview</h1>
      <p class="hint">Локальные ответы без обращения к OpenAI — для визуальной проверки карточки.</p>
      <div class="controls">
        <button data-case="translation">Обычный перевод</button>
        <button data-case="reference">Объяснение названия</button>
        <button data-case="multilingual">Несколько языков</button>
        <button data-case="hidden">Скрытый текст</button>
        <button data-case="russian">Только русский</button>
      </div>

      <p class="sample" id="translation-sample"><mark id="why">Why</mark> does this happen?</p>
      <p class="sample" id="reference-sample">Use <mark id="sensemark">Sensemark</mark> to translate the selection.</p>
      <p class="sample"><mark id="multilingual">Привет! How are you? مرحبا بك.</mark></p>
      <p class="sample">
        <mark id="hidden">Come Close to Allah.<span class="hidden-copy">اقترب من الله.</span></mark>
      </p>
      <p class="sample"><mark id="russian">Этот текст уже написан на русском языке.</mark></p>
    </main>

    <script>
      let runtimeListener = null;
      let previewResponse = "";

      const eventStub = () => ({ addListener() {} });
      window.chrome = {
        i18n: {
          detectLanguage: async (text) => ({
            isReliable: true,
            languages: [{ language: /^[А-Яа-яЁё\s.,!?]+$/u.test(text) ? "ru" : "en", percentage: 100 }]
          })
        },
        storage: {
          local: {
            get: async (defaults) => ({ ...defaults, autoTranslate: false }),
            set: async () => {}
          },
          onChanged: eventStub()
        },
        runtime: {
          onMessage: {
            addListener(listener) { runtimeListener = listener; }
          },
          sendMessage: async () => {},
          connect() {
            let messageListener = null;
            let disconnectListener = null;
            return {
              onMessage: {
                addListener(listener) { messageListener = listener; }
              },
              onDisconnect: {
                addListener(listener) { disconnectListener = listener; }
              },
              postMessage() {
                messageListener?.({ type: "done", text: previewResponse });
              },
              disconnect() { disconnectListener?.(); }
            };
          }
        }
      };

      function selectAndTranslate(element, response) {
        previewResponse = response;
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(element);
        selection.removeAllRanges();
        selection.addRange(range);
        runtimeListener?.({ type: "translate-selection" }, null, () => {});
      }

      window.showPreviewCase = (name) => {
        if (name === "reference") {
          selectAndTranslate(
            document.getElementById("sensemark"),
            "[[reference]]\nназвание\nВероятно, название расширения для контекстного перевода."
          );
        } else if (name === "multilingual") {
          selectAndTranslate(
            document.getElementById("multilingual"),
            "[[multilingual]]\n" +
              "[[script:Cyrillic|lang:русский]]\nПривет!\n" +
              "[[script:Latin|lang:английский]]\nКак дела?\n" +
              "[[script:Arabic|lang:арабский]]\nДобро пожаловать."
          );
        } else if (name === "russian") {
          selectAndTranslate(document.getElementById("russian"), "[[skip]]");
        } else if (name === "hidden") {
          selectAndTranslate(document.getElementById("hidden"), "[[text]]\nПриблизься к Аллаху.");
        } else {
          selectAndTranslate(
            document.getElementById("why"),
            "[[translation]]\nпочему\nдругие значения: зачем"
          );
        }
      };
    </script>
    <script src="../../language-detection.js"></script>
    <script src="../../word-response.js"></script>
    <script src="../../text-response.js"></script>
    <script src="../../content.js"></script>
    <script>
      document.querySelectorAll("[data-case]").forEach((button) => {
        button.addEventListener("click", () => window.showPreviewCase(button.dataset.case));
      });
      window.addEventListener(
        "load",
        () => requestAnimationFrame(() => window.showPreviewCase("translation")),
        { once: true }
      );
    </script>
  </body>
</html>
